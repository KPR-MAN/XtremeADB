name: Build XtremeADB macOS
on:
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install nuitka pillow zstandard imageio

      - name: Get version
        id: version
        run: echo "VER=$(python -c "import json; print(json.load(open('version.json'))['version'])")" >> $GITHUB_OUTPUT

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build App with Nuitka
        run: |
          python -m nuitka --mode=app \
          --macos-app-icon=xadb.png \
          --company-name="KPR-MAN" \
          --product-name="Xtreme ADB" \
          --file-version=2.2.0.0 \
          --product-version=2.2.0.0 \
          --file-description="Xtreme ADB" \
          --remove-output \
          --python-flag=no_docstrings \
          --python-flag=no_asserts \
          --python-flag=no_warnings \
          --lto=yes \
          --enable-plugin=tk-inter \
          --include-data-file=splash.png=splash.png \
          --include-data-file=xadb.png=xadb.png \
          xadb.py

      - name: Create DMG
        run: |
          # Rename the artifact to match the Product Name
          mv xadb.app "Xtreme ADB.app"
          cp -r menu_icons "Xtreme ADB.app/Contents/MacOS/menu_icons"
          
          # Create DMG
          create-dmg \
            --volname "Xtreme ADB" \
            --volicon "xadb.png" \
            --window-pos 200 120 \
            --window-size 800 400 \
            --icon-size 100 \
            --icon "Xtreme ADB.app" 200 190 \
            --hide-extension "Xtreme ADB.app" \
            --app-drop-link 600 185 \
            "xadb_mac_v2.2.dmg" \
            "Xtreme ADB.app" 

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: xadb_mac_v2.2
          path: xadb_mac_v2.2.dmg
