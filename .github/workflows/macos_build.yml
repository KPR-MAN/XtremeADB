name: Build XtremeADB macOS

on:
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install nuitka pillow zstandard imageio

      - name: Get version
        id: version
        run: echo "VER=$(python -c "import json; print(json.load(open('version.json'))['version'])")" >> $GITHUB_OUTPUT

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build with Nuitka
        run: |
          python -m nuitka --mode=app \
          --macos-app-icon=xadb.png \
          --macos-app-create-dmg \
          --company-name="KPR-MAN" \
          --product-name="Xtreme ADB" \
          --file-version=${{ steps.version.outputs.VER }}.0.0 \
          --product-version=${{ steps.version.outputs.VER }}.0.0 \
          --file-description="Xtreme ADB" \
          --remove-output \
          --python-flag=no_docstrings \
          --python-flag=no_asserts \
          --python-flag=no_warnings \
          --lto=yes \
          --enable-plugin=tk-inter \
          xadb.py

      - name: Copy assets into app bundle
        run: |
          cp splash.png xadb.app/Contents/MacOS/
          cp xadb.png xadb.app/Contents/MacOS/

      - name: Rename DMG to match release naming
        run: mv xadb.dmg xadb_mac_v${{ steps.version.outputs.VER }}.dmg

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: Release v${{ steps.version.outputs.VER }}
          files: xadb_mac_v${{ steps.version.outputs.VER }}.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
